  /records.json:
    get:
      tags:
        - Records
      summary: List records
      description: Returns records that match the supplied filters.
      operationId: listRecords
      parameters:
        - name: form_id
          in: query
          description: Filter by form (app) identifier
          schema:
            type: string
        - name: project_id
          in: query
          description: Filter by project identifier
          schema:
            type: string
        - name: assigned_to_id
          in: query
          description: Filter by assignment
          schema:
            type: string
        - name: status
          in: query
          description: Filter by record status
          schema:
            type: string
        - name: bounding_box
          in: query
          description: Comma-separated south,west,north,east bounding box
          schema:
            type: string
        - name: per_page
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Records
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/Record"
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  total_count:
                    type: integer
                  per_page:
                    type: integer
    post:
      tags:
        - Records
      summary: Create record
      operationId: createRecord
