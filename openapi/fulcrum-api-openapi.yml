  /query:
    get:
      tags:
        - Query
      summary: Execute SQL query
      description: >-
        Runs an ad hoc SQL query against the read-only Fulcrum query database
        and returns results as JSON, CSV, GeoJSON, KML, or another supported
        format depending on the format parameter.
      operationId: executeQuery
      parameters:
        - name: q
          in: query
          required: true
          description: SQL query string
          schema:
            type: string
        - name: format
          in: query
          description: Result format
          schema:
            type: string
            enum:
              - json
              - csv
              - geojson
              - kml
      responses:
        "200":
          description: Query results
          content:
