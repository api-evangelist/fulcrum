openapi: 3.1.0
info:
  title: Fulcrum API
  description: >-
    The Fulcrum API is a RESTful HTTP API for the Fulcrum field data
    collection platform. It provides programmatic access to forms, records,
    media (photos, videos, audio, signatures), choice lists, classification
    sets, projects, layers, memberships, roles, webhooks, ad hoc query and
    SQL execution, and changesets. Requests and responses use JSON and
    authenticate with an X-ApiToken header issued from a Fulcrum account.
  version: "0.0.1"
  contact:
    name: Fulcrum
    url: https://www.fulcrumapp.com/
servers:
  - url: https://api.fulcrumapp.com/api/v2
    description: Fulcrum production API (v2)
tags:
  - name: Forms
    description: App and form definitions
  - name: Records
    description: Records collected against a form
  - name: Photos
    description: Photo media attached to records
  - name: Videos
    description: Video media attached to records
  - name: Audio
    description: Audio media attached to records
  - name: Signatures
    description: Signature media attached to records
  - name: Choice Lists
    description: Reusable choice lists referenced by form fields
  - name: Classification Sets
    description: Hierarchical classifications referenced by form fields
  - name: Projects
    description: Project containers used to scope records
  - name: Layers
    description: Layers and tile sources used by forms
  - name: Memberships
    description: Account memberships and assignments
  - name: Roles
    description: Permission roles for memberships
  - name: Webhooks
    description: Outbound webhooks for record and form events
  - name: Changesets
    description: Grouped record changes for sync and audit
  - name: Query
    description: Ad hoc query and SQL execution against Fulcrum data
paths:
  /forms.json:
    get:
      tags:
        - Forms
      summary: List forms
      description: Returns a list of all forms (apps) the authenticated account has access to.
      operationId: listForms
