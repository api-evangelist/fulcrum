naftiko: 1.0.0-alpha2
info:
  label: Fulcrum API — Query
  description: 'Fulcrum API — Query. 1 operations. Lead operation: Execute SQL query. Self-contained Naftiko capability covering
    one Fulcrum business surface.'
  tags:
  - Fulcrum
  - Query
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULCRUM_API_KEY: FULCRUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: fulcrum-query
    baseUri: https://api.fulcrumapp.com/api/v2
    description: Fulcrum API — Query business capability. Self-contained, no shared references.
    resources:
    - name: query
      path: /query
      operations:
      - name: executequery
        method: GET
        description: Execute SQL query
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: SQL query string
          required: true
        - name: format
          in: query
          type: string
          description: Result format
    authentication:
      type: apikey
      key: X-ApiToken
      value: '{{env.FULCRUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: fulcrum-query-rest
    port: 8080
    description: REST adapter for Fulcrum API — Query. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/query
      name: query
      description: REST surface for query.
      operations:
      - method: GET
        name: executequery
        description: Execute SQL query
        call: fulcrum-query.executequery
        with:
          q: rest.q
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fulcrum-query-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fulcrum API — Query. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: execute-sql-query
      description: Execute SQL query
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fulcrum-query.executequery
      with:
        q: tools.q
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
