naftiko: 1.0.0-alpha2
info:
  label: Fulcrum API — Memberships
  description: 'Fulcrum API — Memberships. 2 operations. Lead operation: List memberships. Self-contained Naftiko capability
    covering one Fulcrum business surface.'
  tags:
  - Fulcrum
  - Memberships
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULCRUM_API_KEY: FULCRUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: fulcrum-memberships
    baseUri: https://api.fulcrumapp.com/api/v2
    description: Fulcrum API — Memberships business capability. Self-contained, no shared references.
    resources:
    - name: memberships.json
      path: /memberships.json
      operations:
      - name: listmemberships
        method: GET
        description: List memberships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: memberships-id}.json
      path: /memberships/{id}.json
      operations:
      - name: updatemembership
        method: PUT
        description: Update membership
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-ApiToken
      value: '{{env.FULCRUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: fulcrum-memberships-rest
    port: 8080
    description: REST adapter for Fulcrum API — Memberships. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/memberships-json
      name: memberships-json
      description: REST surface for memberships.json.
      operations:
      - method: GET
        name: listmemberships
        description: List memberships
        call: fulcrum-memberships.listmemberships
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/memberships/id-json
      name: memberships-id-json
      description: REST surface for memberships-id}.json.
      operations:
      - method: PUT
        name: updatemembership
        description: Update membership
        call: fulcrum-memberships.updatemembership
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fulcrum-memberships-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fulcrum API — Memberships. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-memberships
      description: List memberships
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fulcrum-memberships.listmemberships
      outputParameters:
      - type: object
        mapping: $.
    - name: update-membership
      description: Update membership
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: fulcrum-memberships.updatemembership
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
