naftiko: 1.0.0-alpha2
info:
  label: Fulcrum API — Audio
  description: 'Fulcrum API — Audio. 2 operations. Lead operation: List audio clips. Self-contained Naftiko capability covering
    one Fulcrum business surface.'
  tags:
  - Fulcrum
  - Audio
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULCRUM_API_KEY: FULCRUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: fulcrum-audio
    baseUri: https://api.fulcrumapp.com/api/v2
    description: Fulcrum API — Audio business capability. Self-contained, no shared references.
    resources:
    - name: audio.json
      path: /audio.json
      operations:
      - name: listaudio
        method: GET
        description: List audio clips
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadaudio
        method: POST
        description: Upload audio
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-ApiToken
      value: '{{env.FULCRUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: fulcrum-audio-rest
    port: 8080
    description: REST adapter for Fulcrum API — Audio. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/audio-json
      name: audio-json
      description: REST surface for audio.json.
      operations:
      - method: GET
        name: listaudio
        description: List audio clips
        call: fulcrum-audio.listaudio
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadaudio
        description: Upload audio
        call: fulcrum-audio.uploadaudio
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fulcrum-audio-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fulcrum API — Audio. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-audio-clips
      description: List audio clips
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fulcrum-audio.listaudio
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-audio
      description: Upload audio
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fulcrum-audio.uploadaudio
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
