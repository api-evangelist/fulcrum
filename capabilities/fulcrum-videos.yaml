naftiko: 1.0.0-alpha2
info:
  label: Fulcrum API — Videos
  description: 'Fulcrum API — Videos. 2 operations. Lead operation: List videos. Self-contained Naftiko capability covering
    one Fulcrum business surface.'
  tags:
  - Fulcrum
  - Videos
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FULCRUM_API_KEY: FULCRUM_API_KEY
capability:
  consumes:
  - type: http
    namespace: fulcrum-videos
    baseUri: https://api.fulcrumapp.com/api/v2
    description: Fulcrum API — Videos business capability. Self-contained, no shared references.
    resources:
    - name: videos.json
      path: /videos.json
      operations:
      - name: listvideos
        method: GET
        description: List videos
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadvideo
        method: POST
        description: Upload video
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-ApiToken
      value: '{{env.FULCRUM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: fulcrum-videos-rest
    port: 8080
    description: REST adapter for Fulcrum API — Videos. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/videos-json
      name: videos-json
      description: REST surface for videos.json.
      operations:
      - method: GET
        name: listvideos
        description: List videos
        call: fulcrum-videos.listvideos
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadvideo
        description: Upload video
        call: fulcrum-videos.uploadvideo
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fulcrum-videos-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fulcrum API — Videos. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-videos
      description: List videos
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fulcrum-videos.listvideos
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-video
      description: Upload video
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: fulcrum-videos.uploadvideo
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
