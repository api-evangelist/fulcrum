aid: fulcrum
name: Fulcrum
description: >-
  Fulcrum is a field data collection and inspection platform used by teams to
  build mobile forms, capture geospatial records, attach photos, videos, audio,
  and signatures, and synchronize the resulting data with back-office systems.
  The Fulcrum REST API exposes programmatic access to forms, records, media,
  choice lists, classification sets, projects, layers, memberships, roles,
  webhooks, ad hoc SQL queries, and changesets.
