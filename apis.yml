apis:
  - aid: fulcrum:fulcrum-api
    name: Fulcrum API
    description: >-
      The Fulcrum API is a RESTful HTTP API that provides programmatic access to all Fulcrum resources. It supports CRUD
      operations on forms (apps) and records, uploads of photo, video, audio, and signature media tied to records,
      management of choice lists and classification sets, project and layer configuration, account memberships and
      roles, outbound webhooks, and ad hoc SQL queries against a read-only mirror of the customer data. All requests
      authenticate using an X-ApiToken header and exchange JSON bodies.
    humanURL: https://docs.fulcrumapp.com/reference/
    baseURL: https://api.fulcrumapp.com/api/v2
